<section class="chart-card" aria-labelledby="chart-title">
  <div class="chart-header">
    <div>
      <p class="eyebrow">Analytics</p>
      <h2 id="chart-title">Chart.js runtime adapter</h2>
    </div>

    <span class="chart-badge">+18%</span>
  </div>

  <div class="chart-frame">
    <canvas #chartCanvas aria-label="Weekly visitor line chart"></canvas>
  </div>

  <div class="chart-note">
    Chart.js does not read CSS directly from the canvas. The wrapper maps root
    theme tokens into the chart config and updates it at runtime.
  </div>
</section>
